embed_model: "BAAI/bge-base-en-v1.5"
top_k: 10
num_candidates: 50
ensemble_method: "rrf"
ranker_weights: {"faiss":1,"bm25":0,"index_keywords":0}
rrf_k: 60
max_gen_tokens: 400
chunk_mode : "recursive_sections"
gen_model: "models/qwen2.5-3b-instruct-q8_0.gguf"
chunk_size: 2000
chunk_overlap: 200
use_hyde: false
hyde_max_tokens: 300
use_indexed_chunks: false
rerank_mode: "cross_encoder"
rerank_top_k: 5
use_double_prompt: false
enable_history: true
max_history_turns: 3

# Hot-chunk buffer pool (buffer pool management / LRU replacement analogy)
enable_hot_chunk_boost: false
hot_cache_size: 50
hot_chunk_boost_alpha: 0.1
chunk_tracker_db: "data/chunk_access.db"
